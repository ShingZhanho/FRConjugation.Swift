name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Job 1: Build & test the Swift package ──────────────────────────────────
  build-and-test:
    name: Build & Test Swift Package
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift package
        run: |
          cd swift_lib
          swift build

      - name: Test Swift package
        run: |
          cd swift_lib
          swift test

  # ── Job 2: Create GitHub Release ───────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package release assets
        run: |
          mkdir -p release
          tar czf release/model-weights.tar.gz \
            -C swift_lib/Sources/FRConjugation/Resources \
            model.json weights.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/model-weights.tar.gz
